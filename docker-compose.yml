# 풀스택: nginx(프론트) + Django API
# 준비: cp backend/.env.example backend/.env 후 값 입력
# UI: http://localhost:8080  — 브라우저는 /api 만 호출 (nginx → api:8000)
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,api,[::1]}
      SQLITE_PATH: /app/data/db.sqlite3
      # RAG 벡터 스토어를 컨테이너와 함께 영속화 (api_sqlite 볼륨 /app/data 아래)
      CHROMA_PERSIST_DIR: /app/data/chroma
    volumes:
      - api_sqlite:/app/data
    # API만 호스트에서 직접 쓰려면 주석 해제
    # ports:
    #   - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  api_sqlite:
